<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tidsreisen Pro</title>

    <!-- Lim inn dette øverst i <head> på appen din: -->
<meta name="apple-mobile-web-app-title" content="Tidsreisen">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='115' fill='%231e1b4b'/><circle cx='256' cy='256' r='130' fill='none' stroke='%23334155' stroke-width='4' stroke-dasharray='2 16'/><path d='M 256,126 A 130,130 0 0,1 386,256' fill='none' stroke='%23f43f5e' stroke-width='8' stroke-linecap='round'/><line x1='256' y1='256' x2='340' y2='172' stroke='%2338bdf8' stroke-width='10' stroke-linecap='round'/><line x1='256' y1='256' x2='256' y2='140' stroke='%23f43f5e' stroke-width='14' stroke-linecap='round'/><circle cx='256' cy='256' r='16' fill='%23ffffff'/></svg>">

    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* CSS-låsing skreddersydd for iPhone 14 Pro skjermforhold */
        html, body { 
            font-family: 'Fredoka', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overflow: hidden !important;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw;
            height: 100dvh;
            overscroll-behavior: none !important;
            touch-action: manipulation;
        }
        
        .glass { 
            background: rgba(255, 255, 255, 0.07); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.12); 
        }

        /* Tydelig glød bak klokken */
        .clock-glow {
            box-shadow: 0 0 40px -10px rgba(255, 255, 255, 0.1), inset 0 0 20px rgba(255,255,255,0.05);
        }

        @keyframes shake { 
            0%, 100% { transform: translateX(0); } 
            20%, 60% { transform: translateX(-6px); } 
            40%, 80% { transform: translateX(6px); } 
        }
        .animate-shake { animation: shake 0.3s ease-in-out; }
        
        /* Presis margin som unngår Dynamic Island og bunn-streken */
        .safe-top { padding-top: calc(env(safe-area-inset-top) + 24px); }
        .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 12px); }

        /* Dynamic Island Grunnstil og Animasjonskurve */
        .di-idle {
            width: 110px;
            height: 30px;
            background: #000000;
            border-radius: 9999px;
            position: fixed;
            top: 11px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            pointer-events: none;
        }

        .di-active {
            width: 210px;
            height: 38px;
            background: #000000;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="bg-slate-950 text-white flex flex-col justify-between p-4 safe-top safe-bottom select-none">

    <div id="dynamic-island" class="di-idle">
        <span id="di-text" class="text-white text-xs font-bold tracking-wide opacity-0 transition-opacity duration-300 whitespace-nowrap"></span>
    </div>

    <div id="bg-glow" class="fixed inset-0 -z-10 transition-all duration-700" style="background: linear-gradient(to bottom, #020617, #0f172a);"></div>

    <header class="w-full max-w-xs mx-auto grid grid-cols-3 bg-black/30 rounded-2xl p-2.5 glass text-center shadow-lg text-xs">
        <div class="border-r border-white/10">
            <p class="text-[10px] uppercase font-bold tracking-wider text-pink-400">Poeng</p>
            <p id="score-display" class="text-xl font-bold mt-0.5">0</p>
        </div>
        <div class="border-r border-white/10">
            <p class="text-[10px] uppercase font-bold tracking-wider text-amber-400">🔥 Rekke</p>
            <p id="streak-display" class="text-xl font-bold text-amber-300 mt-0.5">0</p>
        </div>
        <div>
            <p class="text-[10px] uppercase font-bold tracking-wider text-cyan-400">Beste</p>
            <p id="best-display" class="text-xl font-bold text-cyan-300 mt-0.5">0</p>
        </div>
    </header>

    <main class="w-full max-w-xs mx-auto flex-1 flex flex-col justify-evenly items-center py-4">
        
        <div class="grid grid-cols-3 gap-1 w-full bg-black/40 p-1 rounded-xl border border-white/5 text-xs shadow-inner">
            <button onclick="g.setDiff('lett')" id="btn-lett" class="py-2 font-bold rounded-lg bg-gradient-to-r from-emerald-500 to-teal-600 shadow text-white">Lett</button>
            <button onclick="g.setDiff('middels')" id="btn-middels" class="py-2 font-semibold rounded-lg text-white/60">Middels</button>
            <button onclick="g.setDiff('vanskelig')" id="btn-vanskelig" class="py-2 font-semibold rounded-lg text-white/60">Vanskelig</button>
        </div>

        <div id="daytime-badge" class="px-5 py-1.5 rounded-full text-xs font-bold tracking-wide shadow-md transition-all duration-500 border">
            Laster inn...
        </div>

        <div class="w-56 h-56 rounded-full relative glass border-2 border-white/20 clock-glow flex items-center justify-center bg-black/20">
            <svg id="clock-svg" viewBox="0 0 200 200" class="w-full h-full p-2.5">
                <circle cx="100" cy="100" r="96" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                
                <g id="clock-face-marks"></g>
                
                <line id="hour-hand" x1="100" y1="100" x2="100" y2="56" stroke="#38bdf8" stroke-width="7" stroke-linecap="round" />
                
                <line id="minute-hand" x1="100" y1="100" x2="100" y2="32" stroke="#fb7185" stroke-width="4.5" stroke-linecap="round" />
                
                <circle cx="100" cy="100" r="6" fill="#f43f5e" stroke="#ffffff" stroke-width="2"/>
            </svg>
        </div>

        <div id="interaction-card" class="w-full bg-white/5 rounded-2xl p-3 glass text-center shadow-xl transition-all duration-300">
            <p id="feedback-text" class="text-xs font-medium text-slate-300 mb-2.5">Hva er klokka på urskiven?</p>
            
            <div class="flex justify-center items-center gap-2 my-0.5">
                <div id="slot-0" class="w-11 h-14 bg-black/50 border-2 border-white/10 rounded-xl flex items-center justify-center text-3xl font-bold text-white/30 transition-all">_</div>
                <div id="slot-1" class="w-11 h-14 bg-black/50 border-2 border-white/10 rounded-xl flex items-center justify-center text-3xl font-bold text-white/30 transition-all">_</div>
                <div class="text-2xl font-bold text-white/40 mb-1 animate-pulse">:</div>
                <div id="slot-2" class="w-11 h-14 bg-black/50 border-2 border-white/10 rounded-xl flex items-center justify-center text-3xl font-bold text-white/30 transition-all">_</div>
                <div id="slot-3" class="w-11 h-14 bg-black/50 border-2 border-white/10 rounded-xl flex items-center justify-center text-3xl font-bold text-white/30 transition-all">_</div>
            </div>
        </div>

    </main>

    <div class="w-full max-w-xs mx-auto flex flex-col gap-2.5">
        <div class="bg-black/40 p-1.5 rounded-2xl glass grid grid-cols-4 gap-1.5 text-xl shadow-2xl">
            <button onclick="np.press(1)" class="bg-white/5 py-3 rounded-xl active:bg-white/20 font-bold">1</button>
            <button onclick="np.press(2)" class="bg-white/5 py-3 rounded-xl active:bg-white/20 font-bold">2</button>
            <button onclick="np.press(3)" class="bg-white/5 py-3 rounded-xl active:bg-white/20 font-bold">3</button>
            <button onclick="np.press(4)" class="bg-white/5 py-3 rounded-xl active:bg-white/20 font-bold">4</button>
            
            <button onclick="np.press(5)" class="bg-white/5 py-3 rounded-xl active:bg-white/20 font-bold">5</button>
            <button onclick="np.press(6)" class="bg-white/5 py-3 rounded-xl active:bg-white/20 font-bold">6</button>
            <button onclick="np.press(7)" class="bg-white/5 py-3 rounded-xl active:bg-white/20 font-bold">7</button>
            <button onclick="np.press(8)" class="bg-white/5 py-3 rounded-xl active:bg-white/20 font-bold">8</button>
            
            <button onclick="np.press(9)" class="bg-white/5 py-3 rounded-xl active:bg-white/20 font-bold">9</button>
            <button onclick="np.press(0)" class="bg-white/5 py-3 rounded-xl active:bg-white/20 font-bold" style="grid-column: span 2">0</button>
            <button onclick="np.clear()" class="bg-rose-950/40 text-rose-400 py-3 rounded-xl active:bg-rose-900/60 text-xs font-bold uppercase tracking-wide">Slett</button>
        </div>

        <button id="action-btn" onclick="g.check()" class="w-full py-4 bg-gradient-to-r from-pink-500 to-purple-600 active:scale-[0.97] font-bold text-xs rounded-xl shadow-lg tracking-wider uppercase transition-all">
            Sjekk svar
        </button>
    </div>

    <script>
        const g = {
            h: 0, m: 0, isPm: false, hasAnswered: false,
            diff: 'lett', score: 0, streak: 0, best: 0,

            init: function() {
                if(localStorage.getItem('klokke_best')) {
                    this.best = parseInt(localStorage.getItem('klokke_best'));
                    document.getElementById('best-display').innerText = this.best;
                }
                this.genFace();
                this.genTime();
                
                document.addEventListener('touchmove', function(e) {
                    e.preventDefault();
                }, { passive: false });
            },

            setDiff: function(d) {
                if(this.hasAnswered) this.next();
                this.diff = d;
                ['lett', 'middels', 'vanskelig'].forEach(lvl => {
                    const btn = document.getElementById(`btn-${lvl}`);
                    if(lvl === d) {
                        const gClass = d === 'lett' ? 'from-emerald-500 to-teal-600' : d === 'middels' ? 'from-amber-500 to-orange-600' : 'from-rose-600 to-red-700';
                        btn.className = `py-2 font-bold rounded-lg bg-gradient-to-r ${gClass} text-white shadow`;
                    } else {
                        btn.className = "py-2 font-semibold rounded-lg text-white/60";
                    }
                });
                this.genFace();
                this.next();
            },

            genFace: function() {
                const holder = document.getElementById('clock-face-marks');
                holder.innerHTML = '';

                for (let i = 1; i <= 60; i++) {
                    const angle = i * 6;
                    const isHour = i % 5 === 0;

                    if (isHour) {
                        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        line.setAttribute("x1", "100"); line.setAttribute("y1", "4"); line.setAttribute("x2", "100"); line.setAttribute("y2", "15");
                        line.setAttribute("stroke", "rgba(255,255,255,0.5)"); line.setAttribute("stroke-width", "2.5");
                        line.setAttribute("transform", `rotate(${angle} 100 100)`);
                        holder.appendChild(line);

                        let showNum = (this.diff === 'lett') || (this.diff === 'middels' && [12,3,6,9].includes(i/5));
                        
                        if (showNum) {
                            const rad = (angle * Math.PI) / 180;
                            const tx = 100 + 74 * Math.sin(rad);
                            const ty = 100 - 74 * Math.cos(rad) + 5.5;
                            const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                            txt.setAttribute("x", tx); txt.setAttribute("y", ty); txt.setAttribute("fill", "#fff");
                            txt.setAttribute("font-size", "15"); txt.setAttribute("font-weight", "600"); txt.setAttribute("text-anchor", "middle");
                            txt.textContent = i / 5;
                            holder.appendChild(txt);
                        }
                    } else {
                        if (this.diff === 'lett' || this.diff === 'middels') {
                            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                            line.setAttribute("x1", "100"); line.setAttribute("y1", "4"); line.setAttribute("x2", "100"); line.setAttribute("y2", "8");
                            line.setAttribute("stroke", "rgba(255,255,255,0.18)"); line.setAttribute("stroke-width", "1");
                            line.setAttribute("transform", `rotate(${angle} 100 100)`);
                            holder.appendChild(line);
                        }
                    }
                }
            },

            genTime: function() {
                this.h = Math.floor(Math.random() * 24);
                this.isPm = this.h >= 12;

                if (this.diff === 'lett') {
                    this.m = [0, 15, 30, 45][Math.floor(Math.random() * 4)];
                } else if (this.diff === 'middels') {
                    this.m = Math.floor(Math.random() * 12) * 5;
                } else {
                    this.m = Math.floor(Math.random() * 60);
                }

                const bgGlow = document.getElementById('bg-glow');
                const badge = document.getElementById('daytime-badge');
                
                if (this.isPm) {
                    bgGlow.style.background = "linear-gradient(to bottom, #b45309, #0c4a6e, #020617)";
                    badge.innerHTML = "☀️ ETTERMIDDAG / KVELD (12:00 - 23:59)";
                    badge.className = "px-4 py-1.5 rounded-full text-xs font-bold tracking-wide shadow-md bg-amber-500 text-slate-950 border-amber-400";
                } else {
                    bgGlow.style.background = "linear-gradient(to bottom, #020617, #4c1d95, #020617)";
                    badge.innerHTML = "🌙 NATT / MORGEN (00:00 - 11:59)";
                    badge.className = "px-4 py-1.5 rounded-full text-xs font-bold tracking-wide shadow-md bg-indigo-600 text-white border-indigo-400";
                }

                const mAngle = this.m * 6;
                const hAngle = (this.h % 12) * 30 + (this.m * 0.5);
                
                const hRad = (hAngle * Math.PI) / 180;
                document.getElementById('hour-hand').setAttribute("x2", 100 + 42 * Math.sin(hRad));
                document.getElementById('hour-hand').setAttribute("y2", 100 - 42 * Math.cos(hRad));

                const mRad = (mAngle * Math.PI) / 180;
                document.getElementById('minute-hand').setAttribute("x2", 100 + 62 * Math.sin(mRad));
                document.getElementById('minute-hand').setAttribute("y2", 100 - 62 * Math.cos(mRad));
                
                np.reset();
            },

            check: function() {
                if (this.hasAnswered) return;
                if (np.idx < 4) {
                    const fb = document.getElementById('feedback-text');
                    fb.textContent = "⚠️ Tast inn alle 4 sifrene først!";
                    fb.className = "text-xs font-bold text-amber-400";
                    return;
                }

                this.hasAnswered = true;
                const guessH = parseInt(np.slots[0] + np.slots[1]);
                const guessM = parseInt(np.slots[2] + np.slots[3]);

                const card = document.getElementById('interaction-card');
                const feedback = document.getElementById('feedback-text');

                if (guessH === this.h && guessM === this.m) {
                    confetti({ particleCount: 80, spread: 50, origin: { y: 0.8 } });
                    this.streak++;
                    this.score += (this.diff === 'lett' ? 10 : this.diff === 'middels' ? 20 : 40);
                    if(this.score > this.best) {
                        this.best = this.score;
                        localStorage.setItem('klokke_best', this.best);
                        document.getElementById('best-display').innerText = this.best;
                    }
                    feedback.textContent = "🎉 Helt perfekt! Riktig tid!";
                    feedback.className = "text-sm font-bold text-emerald-400";
                    card.style.boxShadow = "0 0 20px rgba(52, 211, 153, 0.4)";

                    // DYNAMIC ISLAND ANIMASJON + HAPTISK FEEDBACK
                    const di = document.getElementById('dynamic-island');
                    const diText = document.getElementById('di-text');
                    
                    di.classList.add('di-active');
                    setTimeout(() => {
                        diText.textContent = "Riktig!! 🥳";
                        diText.classList.remove('opacity-0');
                    }, 150);

                    if (navigator.vibrate) {
                        navigator.vibrate(120); // Sender haptisk støt til telefonen
                    }

                    // Skuer den tilbake til normal form etter 2.5 sekunder
                    setTimeout(() => {
                        diText.classList.add('opacity-0');
                        setTimeout(() => {
                            di.classList.remove('di-active');
                            diText.textContent = "";
                        }, 200);
                    }, 2500);

                } else {
                    this.streak = 0;
                    const correctStr = this.h.toString().padStart(2, '0') + ':' + this.m.toString().padStart(2, '0');
                    feedback.innerHTML = `Feil! Det var <span class="text-yellow-300 font-bold">${correctStr}</span>`;
                    feedback.className = "text-sm font-medium text-rose-400";
                    card.classList.add('animate-shake');
                    card.style.boxShadow = "0 0 20px rgba(248, 113, 113, 0.4)";
                    setTimeout(() => card.classList.remove('animate-shake'), 300);
                }

                document.getElementById('score-display').innerText = this.score;
                document.getElementById('streak-display').innerText = this.streak;

                const btn = document.getElementById('action-btn');
                btn.textContent = "Neste oppgave";
                btn.className = "w-full py-4 bg-gradient-to-r from-cyan-500 to-blue-600 font-bold text-xs rounded-xl shadow-md tracking-wider uppercase";
                btn.setAttribute('onclick', 'g.next()');
            },

            next: function() {
                this.hasAnswered = false;
                const card = document.getElementById('interaction-card');
                const feedback = document.getElementById('feedback-text');
                feedback.textContent = "Hva er klokka på urskiven?";
                feedback.className = "text-xs font-medium text-slate-300";
                card.style.boxShadow = "";

                const btn = document.getElementById('action-btn');
                btn.textContent = "Sjekk svar";
                btn.className = "w-full py-4 bg-gradient-to-r from-pink-500 to-purple-600 font-bold text-xs rounded-xl shadow-md tracking-wider uppercase";
                btn.setAttribute('onclick', 'g.check()');

                this.genTime();
            }
        };

        const np = {
            slots: ['', '', '', ''],
            idx: 0,
            press: function(num) {
                if (g.hasAnswered) return;
                if (this.idx < 4) {
                    this.slots[this.idx] = num.toString();
                    this.idx++;
                    this.render();
                }
            },
            clear: function() {
                if (g.hasAnswered) return;
                if (this.idx > 0) {
                    this.idx--;
                    this.slots[this.idx] = '';
                    this.render();
                }
            },
            reset: function() {
                this.slots = ['', '', '', ''];
                this.idx = 0;
                this.render();
            },
            render: function() {
                for (let i = 0; i < 4; i++) {
                    const el = document.getElementById(`slot-${i}`);
                    if (this.slots[i] !== '') {
                        el.textContent = this.slots[i];
                        el.className = "w-11 h-14 bg-black/60 border-2 border-yellow-400 rounded-xl flex items-center justify-center text-3xl font-bold text-yellow-300 scale-105 transition-all";
                    } else {
                        el.textContent = '_';
                        el.className = "w-11 h-14 bg-black/40 border-2 border-white/10 rounded-xl flex items-center justify-center text-3xl font-bold text-white/20 transition-all";
                    }
                    if (i === this.idx && !g.hasAnswered) {
                        el.classList.add('border-purple-500', 'bg-white/5');
                    }
                }
            }
        };

        g.init();
    </script>
</body>
</html>
